<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Not Defteri</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">

  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Not Defteri</h1>
      <button id="toggleTheme" title="Tema değiştir">🌙</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Notlarda ara..." />
    </div>
    <div class="category-filter">
      <select id="categoryFilter">
        <option value="">Tüm kategoriler</option>
      </select>
    </div>
    <button id="newNoteBtn">+ Yeni Not</button>
    <ul id="noteList"></ul>
  </div>

  <div class="no-note-selected" id="noNoteMsg">Bir not seç veya yeni not oluştur</div>

  <div class="editor hidden" id="editorPanel">
    <div class="editor-header">
      <input type="text" id="noteTitle" placeholder="Not başlığı..." />
    </div>
    <div class="editor-meta">
      <input type="text" id="noteCategory" placeholder="Kategori (örn: iş, kişisel)..." />
      <div class="color-picker">
        <span>Renk:</span>
        <button class="color-btn" data-color="" title="Varsayılan"></button>
        <button class="color-btn" data-color="#ef4444" style="background:#ef4444" title="Kırmızı"></button>
        <button class="color-btn" data-color="#f97316" style="background:#f97316" title="Turuncu"></button>
        <button class="color-btn" data-color="#eab308" style="background:#eab308" title="Sarı"></button>
        <button class="color-btn" data-color="#22c55e" style="background:#22c55e" title="Yeşil"></button>
        <button class="color-btn" data-color="#3b82f6" style="background:#3b82f6" title="Mavi"></button>
        <button class="color-btn" data-color="#a855f7" style="background:#a855f7" title="Mor"></button>
      </div>
    </div>
    <div class="toolbar">
      <button class="fmt-btn" data-cmd="undo" title="Geri Al">↺</button>
      <button class="fmt-btn" data-cmd="redo" title="Yinele">↻</button>
      <div style="width:1px;background:var(--border);height:16px;margin:0 4px"></div>
      <button id="fontSizeDec" class="fmt-btn" title="Küçült">−</button>
      <span id="fontSizeVal">16</span>
      <button id="fontSizeInc" class="fmt-btn" title="Büyüt">+</button>
      <div style="width:1px;background:var(--border);height:16px;margin:0 4px"></div>
      <select id="fontFamily" title="Yazı tipi">
        <option value="Segoe UI">Segoe UI</option>
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier New</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Verdana">Verdana</option>
      </select>
      <div style="width:1px;background:var(--border);height:16px;margin:0 4px"></div>
      <button class="fmt-btn" data-cmd="bold" title="Kalın"><b>B</b></button>
      <button class="fmt-btn" data-cmd="italic" title="İtalik"><i>I</i></button>
      <button class="fmt-btn" data-cmd="heading" title="Başlık">H</button>
      <button class="fmt-btn" data-cmd="ul" title="Madde işareti">• Liste</button>
      <button class="fmt-btn" data-cmd="ol" title="Numaralı liste">1. Liste</button>
      <button class="fmt-btn" data-cmd="hr" title="Yatay çizgi">—</button>
      <div class="toolbar-spacer"></div>
      <button id="exportBtn" title="İndir">⬇ İndir</button>
      <button id="pdfBtn" title="PDF olarak kaydet">📄 PDF</button>
    </div>
    <div id="noteContent" contenteditable="true" spellcheck="false" data-placeholder="Notunu buraya yaz..."></div>
    <div class="attachments-area">
      <div class="attachments-header">
        <label id="uploadBtn" title="Dosya yükle">
          ⬆ Belge Yükle
          <input type="file" id="fileInput" multiple hidden />
        </label>
        <ul id="attachmentList"></ul>
      </div>
    </div>
    <div class="editor-footer">
      <span id="wordCount">0 kelime</span>
      <span id="saveStatus"></span>
      <div class="footer-actions">
        <button id="duplicateBtn" title="Notu kopyala">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
        <button id="saveBtn" title="Kaydet">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button id="deleteNoteBtn" title="Notu sil">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
